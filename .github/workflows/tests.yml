name: CI with Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Docker Compose
      run: |
        sudo apt-get update
        sudo apt-get install docker-compose -y
        docker-compose --version

    - name: Build and start containers
      run: |
        docker-compose up -d --build app
        sleep 10

    - name: Run pytest
      run: |
        docker-compose exec -T test pytest tests/ -v --spec

    - name: Run BDD tests
      run: |
        docker-compose exec -T test behave features/ -D browser=chromium -D ui=false

    - name: Shutdown
      if: always()
      run: |
        docker-compose down
