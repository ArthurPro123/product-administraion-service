name: CI with Docker

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Create secrets directory for CI
      run: |
        mkdir -p ./secrets
        # Create dummy certificate files (required for volume mount)
        touch ./secrets/cert.pem
        touch ./secrets/key.pem

    - name: Build and start containers
      env:
        ENV: development
        SECRETS_DIR_PATH: ./secrets
      run: |
        docker compose up -d --build app
        sleep 10

    - name: Run pytest
      run: |
        docker compose exec -T test pytest tests/ -v --spec

    - name: Run BDD tests
      run: |
        docker compose exec -T test behave features/ -D browser=chromium -D ui=false

    - name: Shutdown containers
      if: always()
      run: |
        docker compose down
