name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  tests:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4


    # --- Preparation: --- #

    - name: Create secrets directory
      run: |
        mkdir -p ./secrets
        touch ./secrets/cert.pem
        touch ./secrets/key.pem

    - name: Create .env file
      run: |
        echo "ENV=development" >> .env
        echo "SECRETS_DIR_PATH=./secrets" >> .env


    # --- 1. Run the app for testing with pytest --- #

    - name: Run pytest (in the test container)
      run: |
        docker compose up -d test
        docker compose exec -T test pytest tests/ -v --spec --no-cov


    # --- 2. Run another instance of the app for BDD tests --- #

    - name: Start app for BDD tests
      run: |
        docker compose up -d app
        echo "Waiting for app to be ready..."
        sleep 10


    # --- 3. Run behave in its own container --- #

    - name: Run BDD tests (using host network)
      run: |
        docker run --rm \
          --network host \
          -v $(pwd)/features:/app/features \
          -v $(pwd)/app:/app/app \
          -w /app \
          mcr.microsoft.com/playwright/python:v1.40.0-focal \
          bash -c "
            pip install behave requests playwright &&
            playwright install chromium &&
            # Use localhost instead of app
            export BASE_URL=http://localhost:5000 &&
            behave features/ -D browser=chromium -D ui=false
          "


    # --- Clean up --- #

    - name: Shutdown
      if: always()
      run: |
        docker compose down
